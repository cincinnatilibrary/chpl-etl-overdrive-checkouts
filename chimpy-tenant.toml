# chpl-etl-overdrive-checkouts — chimpy-lake tenant manifest (Tier 3).
#
# Future rename note: this tenant becomes 'cl-extract-overdrive-checkouts'
# at chimpy-lake S4a (the pilot rename; this repo is the lower-volume
# rename used to PROVE the pattern before applying it to circ-trans at S4b).
# Until then the directory + GitHub repo + image name all stay as
# 'chpl-etl-overdrive-checkouts'.

[tenant]
name = "overdrive-checkouts"
kind = "extract"
schema = "overdrive"
image = "ghcr.io/cincinnatilibrary/chpl-etl-overdrive-checkouts"
image_tag = "latest"

[runtime]
# Manifest declares the PRIMARY schedule per the spec convention at
# ~/claude/docs/superpowers/specs/2026-05-23-chimpy-lake-architecture-design.md
# § "Schedules: manifest vs. systemd unit". The live timer at
# systemd/ray-desktop/chpl-etl-overdrive-checkouts.timer carries both the
# morning fire (07:05 UTC, declared here) AND the afternoon fire
# (18:05 UTC, kept in the timer unit only). Both inside OverDrive's
# vendor "allotted time slot" window — see LLORE 110 § "2026-05-25 update".
default_schedule = "OnCalendar=*-*-* 07:05:00 UTC"
runtime_max_sec = 3600
required_env = ["CLIENT_KEY", "CLIENT_SECRET", "WEBSITE_ID", "USER_AGENT"]

[telemetry]
sources = ["overdrive-checkouts"]
emit_runs = true

[lifecycle]
entrypoint = ["python", "app.py"]
subcommands = ["run", "status", "dry-run", "migrate"]

[quality]
table = "overdrive.checkouts"
key_columns = ["checkout_id"]
volume_min = 1
volume_anomaly_pct = 80
